apiVersion: v1
kind: Pod
metadata:
  name: oom-test
spec:
  containers:
  - name: stress-container
    image: polinux/stress
    command: ["stress"]
    args: ["--vm","1","--vm-bytes","200M","--vm-hang","1"]
    resources:
      requests:
        memory: "100Mi"
      limits:
        memory: "300Mi"

